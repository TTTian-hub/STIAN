# CloudBase Framework 配置（供 .github/workflows/deploy.yml 的 CI 自动部署使用）
# 控制台「GitHub 导入」方式不需要本文件，它会直接读取仓库根目录的 Dockerfile。
version: 2

# 部署时使用 GitHub Actions Secret 注入的环境 ID
envId: '{{env.CLOUDBASE_ENV_ID}}'

framework:
  name: askfate
  plugins:
    askfate:
      # 云托管 Node 服务
      use: node
      inputs:
        # 容器运行时的 Node 版本
        runtime: Nodejs18.15.0
        # 监听端口（与 Dockerfile / 服务配置保持一致）
        port: 3000
        # 构建命令
        buildCommand: 'npm run build'
        # 启动命令（Next.js standalone 产物，standalone 已拷贝到 /app 根目录）
        entry: 'node server.js'
        # 安装命令
        installCommand: 'npm ci'
        # 环境变量（生产公网固定走 deepseek；真实 key 请在 CloudBase 控制台/Secret 中设置）
        envVariables:
          AI_PROVIDER: deepseek
          NODE_ENV: production
