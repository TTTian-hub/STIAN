name: Deploy to CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudbase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 官方 0 配置 Action：只需 secretId / secretKey / envId 三个参数，
      # 部署逻辑读取根目录 cloudbaserc.json（容器插件 → Dockerfile 构建）。
      # DEEPSEEK_API_KEY 通过 env 下发，cloudbaserc.json 用 {{env.DEEPSEEK_API_KEY}} 引用注入容器。
      - name: Deploy to Tencent CloudBase
        uses: TencentCloudBase/cloudbase-action@v2
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          secretId: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          secretKey: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          envId: ${{ secrets.CLOUDBASE_ENV_ID }}

# 需在仓库 Settings → Secrets and variables → Actions 配置 4 个 Secret：
#   CLOUDBASE_ENV_ID          CloudBase 环境 ID
#   TENCENT_CLOUD_SECRET_ID   腾讯云 CAM SecretId
#   TENCENT_CLOUD_SECRET_KEY  腾讯云 CAM SecretKey
#   DEEPSEEK_API_KEY          DeepSeek API Key (sk-...)
